name: Build agent images

on:
  push:
    branches: [main]
    # Skip rebuilds for docs-only changes (plans, specs, findings).
    # Mixed commits still trigger: paths-ignore matches only when ALL
    # changed files are ignored. workflow_dispatch and repository_dispatch
    # bypass these filters, so manual/external triggers still rebuild.
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:
  repository_dispatch:
    types: [vibe-kanban-build-updated]

env:
  REGISTRY: ghcr.io
  OWNER: derio-net

jobs:
  build-base:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ github.sha }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: base
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/agent-base:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/agent-base:latest
          cache-from: type=gha,scope=agent-base
          cache-to: type=gha,scope=agent-base,mode=max

  build-shell-base:
    needs: build-base
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ github.sha }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: agent-shell-base
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/agent-shell-base:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/agent-shell-base:latest
          build-args: BASE_SHA=${{ needs.build-base.outputs.sha }}
          cache-from: type=gha,scope=agent-shell-base
          cache-to: type=gha,scope=agent-shell-base,mode=max

  build-children:
    needs: [build-base, build-shell-base]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: secure-agent-kali
            context: kali
            build_args: |
              BASE_SHA=${{ needs.build-shell-base.outputs.sha }}
          - name: vk-local
            context: vk-local
            build_args: |
              AGENT_BASE_SHA=${{ needs.build-base.outputs.sha }}
              VK_FORK_SHA=${{ github.event.client_payload.vk_fork_sha || 'latest' }}
          - name: paperclip-shell
            context: paperclip-shell
            build_args: |
              BASE_SHA=${{ needs.build-shell-base.outputs.sha }}
          - name: ruflo-shell
            context: ruflo-shell
            build_args: |
              BASE_SHA=${{ needs.build-shell-base.outputs.sha }}
          - name: ruflo-server
            context: ruflo-server
            build_args: ""
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image.name }}:latest
          build-args: ${{ matrix.image.build_args }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max

  smoke-test-vk-local:
    needs: build-children
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      VK_IMAGE: ghcr.io/derio-net/vk-local
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Smoke test — entrypoint wrapper runs init.d scripts
        env:
          IMAGE_SHA: ${{ github.sha }}
        run: |
          # The mount target is owned by the runner (root); chown to UID 1000
          # so the in-container claude user (also UID 1000) can write into it.
          # Without this, the init scripts hit EACCES on mkdir.
          mkdir -p /tmp/test-home
          sudo chown 1000:1000 /tmp/test-home
          # Run the shared init scripts directly (bypass vibe-kanban startup so
          # the test stays environment-free). Verifies:
          #   1. /opt/agent-init.d/* scripts are present and executable
          #   2. 01-pvc-dirs creates $HOME/repos and other expected dirs
          #   3. Wrapper iterates scripts correctly as the claude user
          docker run --rm \
            --user 1000:1000 \
            -v /tmp/test-home:/home/claude \
            --entrypoint /bin/sh \
            "${VK_IMAGE}:${IMAGE_SHA}" \
            -c 'for s in /opt/agent-init.d/*; do [ -x "$s" ] && "$s"; done && ls /home/claude/repos /home/claude/.ssh'

  smoke-test-secure-agent-kali:
    needs: build-children
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      KALI_IMAGE: ghcr.io/derio-net/secure-agent-kali
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Smoke test — s6-overlay /init under K8s-equivalent securityContext
        env:
          IMAGE_SHA: ${{ github.sha }}
        run: |
          # Match the live secure-agent-pod securityContext so the s6-overlay
          # preinit hits the same /run constraints it does in K8s. Without
          # --cap-drop=ALL --security-opt=no-new-privileges, suexec can chown
          # /run at runtime and the test cannot detect missing image-side chowns.
          mkdir -p /tmp/kali-home
          sudo chown 1000:1000 /tmp/kali-home
          docker run -d --name kali-smoke \
            --user 1000:1000 \
            --cap-drop=ALL \
            --security-opt=no-new-privileges \
            -v /tmp/kali-home:/home/claude \
            "${KALI_IMAGE}:${IMAGE_SHA}"
          # /init must reach stage 2 (services up). 30s is plenty for the
          # shell-base startup; CrashLoopBackOff would surface inside ~3s.
          # s6-overlay v3 installs binaries under /command/ — the agent-base
          # PATH does not include it, so we must call s6-svstat by full path.
          for i in $(seq 1 30); do
            if docker exec kali-smoke /command/s6-svstat /run/service/sshd 2>/dev/null | grep -q '^up'; then
              echo "✓ s6-overlay started, sshd is up"
              docker logs kali-smoke
              docker rm -f kali-smoke
              exit 0
            fi
            sleep 1
          done
          echo "✗ s6-overlay did not bring sshd up within 30s"
          docker logs kali-smoke
          docker rm -f kali-smoke
          exit 1

  smoke-test-paperclip-shell:
    needs: build-children
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      PAPERCLIP_SHELL_IMAGE: ghcr.io/derio-net/paperclip-shell
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Smoke test — s6-overlay /init under K8s-equivalent securityContext
        env:
          IMAGE_SHA: ${{ github.sha }}
        run: |
          # Match the live paperclip-shell securityContext (runAsUser: 1000,
          # cap-drop=ALL, no-new-privileges) so the s6-overlay preinit hits the
          # same /run constraints it does in K8s.
          mkdir -p /tmp/paperclip-shell-home /tmp/paperclip-shell-inventory
          sudo chown 1000:1000 /tmp/paperclip-shell-home /tmp/paperclip-shell-inventory
          # Empty inventory — first-deploy posture. The installer should report
          # "0 installed" and exit clean, not block sshd.
          echo '{}' | sudo tee /tmp/paperclip-shell-inventory/inventory.yaml >/dev/null
          sudo chown 1000:1000 /tmp/paperclip-shell-inventory/inventory.yaml

          docker run -d --name paperclip-shell-smoke \
            --user 1000:1000 \
            --cap-drop=ALL \
            --security-opt=no-new-privileges \
            -v /tmp/paperclip-shell-home:/home/agent \
            -v /tmp/paperclip-shell-inventory:/etc/paperclip-shell:ro \
            "${PAPERCLIP_SHELL_IMAGE}:${IMAGE_SHA}"

          # /init must reach stage 2 (sshd up). 30s budget mirrors kali smoke.
          for i in $(seq 1 30); do
            if docker exec paperclip-shell-smoke /command/s6-svstat /run/service/sshd 2>/dev/null | grep -q '^up'; then
              echo "✓ s6-overlay started, sshd is up"
              break
            fi
            sleep 1
          done
          if ! docker exec paperclip-shell-smoke /command/s6-svstat /run/service/sshd 2>/dev/null | grep -q '^up'; then
            echo "✗ sshd never came up within 30s"
            docker logs paperclip-shell-smoke
            docker rm -f paperclip-shell-smoke
            exit 1
          fi

          # Layer-1 managers must be on PATH and runnable as the agent UID.
          docker exec paperclip-shell-smoke mise --version
          docker exec paperclip-shell-smoke rustup --version
          docker exec paperclip-shell-smoke pipx --version
          docker exec paperclip-shell-smoke python3 --version

          # Inventory installer must exist on PATH and rerun cleanly with empty inventory.
          docker exec paperclip-shell-smoke /usr/local/bin/paperclip-shell-reconcile

          # Boot-time reconcile log must show the empty-inventory clean exit.
          docker exec paperclip-shell-smoke cat /var/log/cont-init.d/40-shell-inventory.log

          # MOTD drop-in must have been written and contain a recognizable summary.
          docker exec paperclip-shell-smoke cat /var/lib/paperclip-shell/last-reconcile.motd

          docker logs paperclip-shell-smoke
          docker rm -f paperclip-shell-smoke

  smoke-test-ruflo-shell:
    needs: build-children
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      RUFLO_SHELL_IMAGE: ghcr.io/derio-net/ruflo-shell
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Smoke test — s6-overlay /init under K8s-equivalent securityContext
        env:
          IMAGE_SHA: ${{ github.sha }}
        run: |
          # Match the live ruflo-shell securityContext (runAsUser: 1000,
          # cap-drop=ALL, no-new-privileges) so the s6-overlay preinit hits the
          # same /run constraints it does in K8s.
          mkdir -p /tmp/ruflo-shell-home /tmp/ruflo-shell-inventory
          sudo chown 1000:1000 /tmp/ruflo-shell-home /tmp/ruflo-shell-inventory
          # Empty inventory — first-deploy posture. The installer should report
          # "0 installed" and exit clean, not block sshd.
          echo '{}' | sudo tee /tmp/ruflo-shell-inventory/inventory.yaml >/dev/null
          sudo chown 1000:1000 /tmp/ruflo-shell-inventory/inventory.yaml

          docker run -d --name ruflo-shell-smoke \
            --user 1000:1000 \
            --cap-drop=ALL \
            --security-opt=no-new-privileges \
            -v /tmp/ruflo-shell-home:/home/agent \
            -v /tmp/ruflo-shell-inventory:/etc/ruflo-shell:ro \
            "${RUFLO_SHELL_IMAGE}:${IMAGE_SHA}"

          # /init must reach stage 2 (sshd up). 30s budget mirrors paperclip smoke.
          for i in $(seq 1 30); do
            if docker exec ruflo-shell-smoke /command/s6-svstat /run/service/sshd 2>/dev/null | grep -q '^up'; then
              echo "✓ s6-overlay started, sshd is up"
              break
            fi
            sleep 1
          done
          if ! docker exec ruflo-shell-smoke /command/s6-svstat /run/service/sshd 2>/dev/null | grep -q '^up'; then
            echo "✗ sshd never came up within 30s"
            docker logs ruflo-shell-smoke
            docker rm -f ruflo-shell-smoke
            exit 1
          fi

          # Layer-1 managers must be on PATH and runnable as the agent UID.
          docker exec ruflo-shell-smoke mise --version
          docker exec ruflo-shell-smoke rustup --version
          docker exec ruflo-shell-smoke pipx --version
          docker exec ruflo-shell-smoke python3 --version

          # claude-code is baked in — must be on PATH from a fresh SSH session.
          docker exec ruflo-shell-smoke claude --version

          # Inventory installer must exist on PATH and rerun cleanly with empty inventory.
          docker exec ruflo-shell-smoke /usr/local/bin/ruflo-shell-reconcile

          # Boot-time reconcile log must show the empty-inventory clean exit.
          docker exec ruflo-shell-smoke cat /var/log/cont-init.d/40-shell-inventory.log

          # MOTD drop-in must have been written and contain a recognizable summary.
          docker exec ruflo-shell-smoke cat /var/lib/ruflo-shell/last-reconcile.motd

          # Banner profile.d drop-in must be present (sourced by /etc/profile on
          # SSH login; we only assert the file is in place and runnable here).
          docker exec ruflo-shell-smoke test -x /etc/profile.d/60-ruflo-shell-banner.sh

          docker logs ruflo-shell-smoke
          docker rm -f ruflo-shell-smoke

  smoke-test-ruflo-server:
    needs: build-children
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      RUFLO_SERVER_IMAGE: ghcr.io/derio-net/ruflo-server
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Smoke test — ruvocal boots and binds port 3000
        env:
          IMAGE_SHA: ${{ github.sha }}
        run: |
          # Ruvocal connects to the database lazily on first request; the HTTP
          # server binds 3000 at startup regardless of DB availability. Smoke
          # test asserts: container stays running, port 3000 is reachable, and
          # / returns any HTTP status (2xx/3xx/4xx/5xx — anything but no-conn).
          docker run -d --name ruflo-server-smoke \
            --user 1000:1000 \
            -p 13000:3000 \
            "${RUFLO_SERVER_IMAGE}:${IMAGE_SHA}"

          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null -w "" http://localhost:13000/ 2>/dev/null \
                || curl -sS -o /dev/null -w "%{http_code}" http://localhost:13000/ 2>/dev/null \
                  | grep -qE '^[1-5][0-9][0-9]$'; then
              echo "✓ ruvocal listening on port 3000 after ${i}s"
              break
            fi
            sleep 1
          done

          # Final assertion — any HTTP status code from the server proves it bound.
          status=$(curl -sS -o /dev/null -w "%{http_code}" http://localhost:13000/ 2>/dev/null || echo "000")
          if ! echo "$status" | grep -qE '^[1-5][0-9][0-9]$'; then
            echo "✗ ruvocal never answered on port 3000 (last status: $status)"
            docker logs ruflo-server-smoke
            docker rm -f ruflo-server-smoke
            exit 1
          fi
          echo "✓ ruvocal answered with HTTP $status"

          # Container must still be running (didn't crash post-bind).
          if ! docker inspect -f '{{.State.Running}}' ruflo-server-smoke | grep -q true; then
            echo "✗ container exited after binding"
            docker logs ruflo-server-smoke
            docker rm -f ruflo-server-smoke
            exit 1
          fi

          docker logs ruflo-server-smoke | tail -50
          docker rm -f ruflo-server-smoke

  dispatch-frank:
    needs:
      - build-children
      - smoke-test-vk-local
      - smoke-test-secure-agent-kali
      - smoke-test-paperclip-shell
      - smoke-test-ruflo-shell
      - smoke-test-ruflo-server
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - env:
          GH_TOKEN: ${{ secrets.DISPATCH_PAT }}
        run: |
          gh api repos/derio-net/frank/dispatches \
            -f event_type=agent-images-bumped \
            -f client_payload[agent_images_sha]=$GITHUB_SHA
