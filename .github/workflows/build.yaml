name: Build agent images

on:
  push:
    branches: [main]
    # Skip rebuilds for docs-only changes (plans, specs, findings).
    # Mixed commits still trigger: paths-ignore matches only when ALL
    # changed files are ignored. workflow_dispatch and repository_dispatch
    # bypass these filters, so manual/external triggers still rebuild.
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:
  repository_dispatch:
    types: [vibe-kanban-build-updated]

env:
  REGISTRY: ghcr.io
  OWNER: derio-net

jobs:
  build-base:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ github.sha }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: base
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/agent-base:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/agent-base:latest
          cache-from: type=gha,scope=agent-base
          cache-to: type=gha,scope=agent-base,mode=max

  build-children:
    needs: build-base
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: agent-shell-base
            context: agent-shell-base
            build_args: |
              BASE_SHA=${{ needs.build-base.outputs.sha }}
          - name: secure-agent-kali
            context: kali
            build_args: |
              AGENT_BASE_SHA=${{ needs.build-base.outputs.sha }}
          - name: vk-local
            context: vk-local
            build_args: |
              AGENT_BASE_SHA=${{ needs.build-base.outputs.sha }}
              VK_FORK_SHA=${{ github.event.client_payload.vk_fork_sha || 'latest' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image.name }}:latest
          build-args: ${{ matrix.image.build_args }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max

  smoke-test-vk-local:
    needs: build-children
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      VK_IMAGE: ghcr.io/derio-net/vk-local
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Smoke test — entrypoint wrapper runs init.d scripts
        env:
          IMAGE_SHA: ${{ github.sha }}
        run: |
          mkdir -p /tmp/test-home
          # Run the shared init scripts directly (bypass vibe-kanban startup so
          # the test stays environment-free). Verifies:
          #   1. /opt/agent-init.d/* scripts are present and executable
          #   2. 01-pvc-dirs creates $HOME/repos and other expected dirs
          #   3. Wrapper iterates scripts correctly as the claude user
          docker run --rm \
            --user 1000:1000 \
            -v /tmp/test-home:/home/claude \
            --entrypoint /bin/sh \
            "${VK_IMAGE}:${IMAGE_SHA}" \
            -c 'for s in /opt/agent-init.d/*; do [ -x "$s" ] && "$s"; done && ls /home/claude/repos /home/claude/.ssh'

  dispatch-frank:
    needs: [build-children, smoke-test-vk-local]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - env:
          GH_TOKEN: ${{ secrets.DISPATCH_PAT }}
        run: |
          gh api repos/derio-net/frank/dispatches \
            -f event_type=agent-images-bumped \
            -f client_payload[agent_images_sha]=$GITHUB_SHA
